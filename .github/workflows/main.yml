<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>HORROR MINI - MOBILE EDITION Alpha 0.03</title>
    <style>
        /* Yatay mod zorlaması ve genel stil */
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); z-index: 100;
        }
        #logo { color: #ff0000; font-size: 32px; font-weight: bold; text-align: center; text-shadow: 2px 2px #000; }
        .menu-btn { background: #eee; border: none; padding: 15px 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; border-radius: 8px; }

        #controls { display: none; }
        
        /* Yatayda buton yerleşimi */
        .joystick { position: absolute; bottom: 20px; left: 30px; display: grid; grid-template-columns: repeat(3, 60px); gap: 5px; z-index: 50; }
        .actions { position: absolute; bottom: 20px; right: 30px; display: flex; gap: 20px; z-index: 50; }

        .btn { 
            width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.4); 
            color: white; font-weight: bold; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; user-select: none; -webkit-user-select: none;
        }
        .action-btn { width: 90px; height: 90px; border-radius: 50%; font-size: 16px; border: 2px solid #fff; }
        #btn-kaz { background: rgba(255, 0, 0, 0.3); }
        #btn-koy { background: rgba(0, 255, 0, 0.3); }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 40; mix-blend-mode: difference;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="logo">HORROR MINI<br><span style="font-size: 18px; color: #fff;">MOBILE LANDSCAPE EDITION</span><br><span style="font-size: 14px; color: #aaa;">Alpha 0.03</span></div>
        <button class="menu-btn" onclick="startGame()">OYUNU BAŞLAT</button>
    </div>

    <div id="controls">
        <div class="joystick">
            <div></div><div class="btn" id="m-up">▲</div><div></div>
            <div class="btn" id="m-left">◀</div><div class="btn" id="m-down">▼</div><div class="btn" id="m-right">▶</div>
        </div>
        <div class="actions">
            <div class="btn action-btn" id="btn-kaz">KAZ</div>
            <div class="btn action-btn" id="btn-koy">KOY</div>
        </div>
        <div id="crosshair"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, stalker;
        let isGameStarted = false;
        let move = { f: false, b: false, l: false, r: false };
        let lastTouchX = 0, lastTouchY = 0;
        
        const mats = {
            grass: new THREE.MeshStandardMaterial({ color: 0x567d46 }),
            dirt: new THREE.MeshStandardMaterial({ color: 0x8b4513 }),
            stone: new THREE.MeshStandardMaterial({ color: 0x777777 }),
            trunk: new THREE.MeshStandardMaterial({ color: 0x4d2926 }),
            leaves: new THREE.MeshStandardMaterial({ color: 0x228B22 }),
            stalker: new THREE.MeshBasicMaterial({ color: 0xffffff })
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 15, 60);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 0);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true,
                logarithmicDepthBuffer: true // Titremeyi (Z-fighting) önleyen kritik ayar
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(10, 30, 10);
            scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

            stalker = new THREE.Mesh(new THREE.BoxGeometry(0.7, 2.2, 0.7), mats.stalker);
            stalker.position.set(20, 10, 20);
            scene.add(stalker);

            setupControls();
            createWorld();
        }

        function setupControls() {
            const bind = (id, k) => {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', (e) => { e.preventDefault(); move[k] = true; });
                el.addEventListener('touchend', (e) => { e.preventDefault(); move[k] = false; });
            };
            bind('m-up','f'); bind('m-down','b'); bind('m-left','l'); bind('m-right','r');

            document.getElementById('btn-kaz').addEventListener('touchstart', (e) => { e.preventDefault(); breakBlock(); });
            document.getElementById('btn-koy').addEventListener('touchstart', (e) => { e.preventDefault(); placeBlock(); });

            window.addEventListener('touchmove', (e) => {
                if(!isGameStarted) return;
                let touch = e.touches[0];
                if(touch.clientX > window.innerWidth / 2) {
                    if(lastTouchX !== 0) {
                        camera.rotation.y -= (touch.clientX - lastTouchX) * 0.005;
                        camera.rotation.x -= (touch.clientY - lastTouchY) * 0.005;
                        camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                    }
                    lastTouchX = touch.clientX; lastTouchY = touch.clientY;
                }
            });
            window.addEventListener('touchend', () => { lastTouchX = 0; lastTouchY = 0; });
        }

        function createWorld() {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            for(let x = -12; x < 12; x++) {
                for(let z = -12; z < 12; z++) {
                    let h = Math.floor(Math.sin(x*0.15) * Math.cos(z*0.15) * 3 + 5);
                    for(let y = 0; y <= h; y++) {
                        const m = (y === h) ? mats.grass : (y > h-2 ? mats.dirt : mats.stone);
                        const b = new THREE.Mesh(geo, m);
                        b.position.set(x, y, z);
                        scene.add(b);
                    }
                    if(h >= 5 && Math.random() < 0.03) spawnTree(x, h, z);
                }
            }
        }

        function spawnTree(x, y, z) {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            // Gövde
            for(let i=1; i<=4; i++) {
                const tr = new THREE.Mesh(geo, mats.trunk);
                tr.position.set(x, y+i, z);
                scene.add(tr);
            }
            // Yapraklar (Artık var!)
            for(let lx=-1; lx<=1; lx++) {
                for(let ly=4; ly<=6; ly++) {
                    for(let lz=-1; lz<=1; lz++) {
                        if(lx===0 && lz===0 && ly<6) continue;
                        const leaf = new THREE.Mesh(geo, mats.leaves);
                        leaf.position.set(x+lx, y+ly, z+lz);
                        scene.add(leaf);
                    }
                }
            }
        }

        function breakBlock() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children);
            if(hits.length > 0 && hits[0].distance < 6 && hits[0].object !== stalker) scene.remove(hits[0].object);
        }

        function placeBlock() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children);
            if(hits.length > 0 && hits[0].distance < 6) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mats.stone);
                b.position.copy(hits[0].object.position).add(hits[0].face.normal);
                scene.add(b);
            }
        }

        function startGame() {
            isGameStarted = true;
            document.getElementById('ui-overlay').style.display = 'none';
            document.getElementById('controls').style.display = 'block';
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(isGameStarted) {
                const speed = 0.15;
                if(move.f) camera.translateZ(-speed);
                if(move.b) camera.translateZ(speed);
                if(move.l) camera.translateX(-speed);
                if(move.r) camera.translateX(speed);
                
                stalker.lookAt(camera.position.x, 10, camera.position.z);

                const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0,-1,0));
                const hit = ray.intersectObjects(scene.children);
                if(hit.length > 0 && hit[0].distance < 1.8) {
                    camera.position.y = hit[0].point.y + 1.8;
                } else { camera.position.y -= 0.1; }
            }
            renderer.render(scene, camera);
        }

        init();
        animate();
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
