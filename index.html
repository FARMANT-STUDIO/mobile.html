<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HORROR MINI - MOBILE EDITION Alpha 0.03</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; user-select: none; }
        
        /* Arayüz */
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); z-index: 100;
        }
        #logo { color: #ff0000; font-size: 38px; font-weight: bold; text-shadow: 4px 4px #000; text-align: center; animation: glitch 0.2s infinite; }
        .menu-btn { background: #440000; color: white; border: 2px solid #ff0000; padding: 20px 60px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        /* Mobil Kontroller */
        #walk-zone { 
            position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; 
            background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4); 
            border-radius: 50%; z-index: 50; display: none;
        }
        #look-area { 
            position: absolute; top: 0; right: 0; width: 65%; height: 100%; 
            z-index: 40; display: none;
        }

        /* Aksiyon Butonları */
        #action-bar { 
            position: absolute; bottom: 30px; right: 20px; 
            display: none; flex-direction: column; gap: 15px; z-index: 60; 
        }
        .act-btn { 
            width: 75px; height: 75px; background: rgba(139,0,0,0.7); 
            border: 2px solid #fff; border-radius: 50%; color: white; font-weight: bold; 
        }

        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            border: 1px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
            pointer-events: none; mix-blend-mode: difference; display: none; z-index: 45; 
        }

        @keyframes glitch { 0% { transform: skew(1deg); } 50% { transform: skew(-1deg); color: #aa0000; } 100% { transform: skew(0); } }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="logo">KORKU MINI<br><span style="font-size: 18px; color: #fff;">MOBILE EDITION Alpha 0.03</span></div>
        <button class="menu-btn" onclick="startGame()">OYUNA BAŞLA</button>
    </div>

    <div id="walk-zone"></div>
    <div id="look-area"></div>

    <div id="action-bar">
        <button class="act-btn" id="btn-break">KIR</button>
        <button class="act-btn" id="btn-place">KOY</button>
    </div>

    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- DEĞİŞKENLER ---
        let scene, camera, renderer, stalker;
        let isGameStarted = false;
        let moveForward = false;
        let velocity = new THREE.Vector3();
        let chunks = {};
        const CHUNK_SIZE = 8;
        const RENDER_DISTANCE = 3;

        let lastTouchX = 0, lastTouchY = 0, lookTouchID = null;

        // --- MATERYALLER ---
        const mats = {
            grass: new THREE.MeshLambertMaterial({ color: 0x2d4c1e }),
            dirt: new THREE.MeshLambertMaterial({ color: 0x4b3020 }),
            stone: new THREE.MeshLambertMaterial({ color: 0x666666 }),
            trunk: new THREE.MeshLambertMaterial({ color: 0x3d251e }),
            leaves: new THREE.MeshLambertMaterial({ color: 0x0f3d0f }),
            stalker: new THREE.MeshBasicMaterial({ color: 0xffffff })
        };

        const blockGeo = new THREE.BoxGeometry(1, 1, 1);

        // --- BAŞLATMA ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.Fog(0x020202, 5, 35);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Gelişmiş Işıklandırma (Atmosfer)
            const ambient = new THREE.AmbientLight(0x404040, 0.4);
            scene.add(ambient);
            
            const torch = new THREE.PointLight(0xff0000, 1.2, 15); // Oyuncunun kırmızı feneri
            camera.add(torch);
            scene.add(camera);

            spawnStalker();
            camera.position.set(4, 15, 4);

            setupControls();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // --- MOBİL KONTROL MANTIĞI ---
        function setupControls() {
            const walkZone = document.getElementById('walk-zone');
            const lookArea = document.getElementById('look-area');

            // Yürüme (Sol Taraf)
            walkZone.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                moveForward = true; 
                walkZone.style.background = "rgba(255,0,0,0.2)";
            }, {passive: false});
            walkZone.addEventListener('touchend', () => { 
                moveForward = false; 
                walkZone.style.background = "rgba(255,255,255,0.15)";
            });

            // Bakış (Sağ Taraf)
            lookArea.addEventListener('touchstart', (e) => {
                const touch = e.changedTouches[0];
                lookTouchID = touch.identifier;
                lastTouchX = touch.pageX;
                lastTouchY = touch.pageY;
            });

            lookArea.addEventListener('touchmove', (e) => {
                if(!isGameStarted) return;
                for(let t of e.changedTouches) {
                    if(t.identifier === lookTouchID) {
                        camera.rotation.y -= (t.pageX - lastTouchX) * 0.006;
                        camera.rotation.x -= (t.pageY - lastTouchY) * 0.006;
                        camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                        lastTouchX = t.pageX;
                        lastTouchY = t.pageY;
                    }
                }
            }, {passive: false});

            // Aksiyonlar
            document.getElementById('btn-break').addEventListener('touchstart', (e) => { e.preventDefault(); breakBlock(); });
            document.getElementById('btn-place').addEventListener('touchstart', (e) => { e.preventDefault(); placeBlock(); });
        }

        // --- DÜNYA VE AĞAÇLAR ---
        function createTree(x, y, z) {
            let h = 4 + Math.floor(Math.random() * 2);
            for(let i = 1; i <= h; i++) {
                const log = new THREE.Mesh(blockGeo, mats.trunk);
                log.position.set(x, y + i, z);
                scene.add(log);
            }
            for(let ox = -1; ox <= 1; ox++) {
                for(let oz = -1; oz <= 1; oz++) {
                    const leaf = new THREE.Mesh(blockGeo, mats.leaves);
                    leaf.position.set(x + ox, y + h + 1, z + oz);
                    scene.add(leaf);
                }
            }
        }

        function createChunk(cx, cz) {
            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const wX = cx * CHUNK_SIZE + x;
                    const wZ = cz * CHUNK_SIZE + z;
                    let h = Math.floor(Math.sin(wX * 0.2) * 1.5 + 5);
                    for (let y = 0; y <= h; y++) {
                        const b = new THREE.Mesh(blockGeo, y === h ? mats.grass : (y > h-2 ? mats.dirt : mats.stone));
                        b.position.set(wX, y, wZ);
                        scene.add(b);
                    }
                    if (h >= 5 && Math.random() < 0.05) createTree(wX, h, wZ);
                }
            }
            chunks[`${cx},${cz}`] = true;
        }

        function updateChunks() {
            const pX = Math.floor(camera.position.x / CHUNK_SIZE);
            const pZ = Math.floor(camera.position.z / CHUNK_SIZE);
            for(let x = pX - RENDER_DISTANCE; x <= pX + RENDER_DISTANCE; x++) {
                for(let z = pZ - RENDER_DISTANCE; z <= pZ + RENDER_DISTANCE; z++) {
                    if(!chunks[`${x},${z}`]) createChunk(x, z);
                }
            }
        }

        // --- ETKİLEŞİM ---
        function breakBlock() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children);
            if(hits.length > 0 && hits[0].distance < 6 && hits[0].object !== stalker) {
                scene.remove(hits[0].object);
            }
        }

        function placeBlock() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children);
            if(hits.length > 0 && hits[0].distance < 6) {
                const b = new THREE.Mesh(blockGeo, mats.stone);
                b.position.copy(hits[0].object.position).add(hits[0].face.normal);
                scene.add(b);
            }
        }

        // --- VARLIKLAR ---
        function spawnStalker() {
            stalker = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2.2, 0.6), mats.stalker);
            stalker.position.set(15, 10, 15);
            scene.add(stalker);
        }

        function startGame() {
            document.getElementById('ui-overlay').style.display = 'none';
            document.getElementById('walk-zone').style.display = 'block';
            document.getElementById('look-area').style.display = 'block';
            document.getElementById('action-bar').style.display = 'flex';
            document.getElementById('crosshair').style.display = 'block';
            isGameStarted = true;
        }

        // --- OYUN DÖNGÜSÜ ---
        function update() {
            if(!isGameStarted) return;

            if(moveForward) camera.translateZ(-0.16);

            updateChunks();

            // Stalker AI (Sürekli Takip)
            stalker.lookAt(camera.position);
            stalker.position.x += (camera.position.x - stalker.position.x) * 0.006;
            stalker.position.z += (camera.position.z - stalker.position.z) * 0.006;

            // Fizik (Yerçekimi)
            const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0,-1,0));
            const hit = ray.intersectObjects(scene.children);
            if(hit.length > 0 && hit[0].distance < 1.7) {
                velocity.y = 0;
                camera.position.y = hit[0].point.y + 1.7;
            } else { velocity.y -= 0.01; }
            camera.position.y += velocity.y;
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
