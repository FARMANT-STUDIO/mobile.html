<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HORROR MINI - Alpha 0.03 (White Fog Edition)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #eee; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; user-select: none; }
        
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.9); z-index: 100;
        }
        #logo { color: #000; font-size: 38px; font-weight: bold; text-align: center; }
        .menu-btn { background: #000; color: white; border: none; padding: 20px 60px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        #walk-zone { 
            position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; 
            background: rgba(0,0,0,0.1); border: 2px solid rgba(0,0,0,0.3); 
            border-radius: 50%; z-index: 50; display: none;
        }
        #look-area { 
            position: absolute; top: 0; right: 0; width: 65%; height: 100%; 
            z-index: 40; display: none;
        }

        #action-bar { 
            position: absolute; bottom: 30px; right: 20px; 
            display: none; flex-direction: column; gap: 15px; z-index: 60; 
        }
        .act-btn { 
            width: 75px; height: 75px; background: rgba(0,0,0,0.7); 
            border: 2px solid #fff; border-radius: 50%; color: white; font-weight: bold; 
        }

        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            border: 1px solid black; border-radius: 50%; transform: translate(-50%, -50%); 
            pointer-events: none; display: none; z-index: 45; 
        }

        /* İstediğin sağ alt yazı */
        #version-info {
            position: absolute; bottom: 10px; right: 10px;
            color: #000; font-size: 10px; text-align: right;
            pointer-events: none; z-index: 70; max-width: 250px;
            background: rgba(255,255,255,0.5); padding: 5px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="logo">KORKU MINI<br><span style="font-size: 18px; color: #333;">WHITE FOG Alpha 0.03</span></div>
        <button class="menu-btn" onclick="startGame()">OYUNA BAŞLA</button>
    </div>

    <div id="version-info">ALPHA 0.03 (BU SÜRÜMDE BAZI BÜYÜK ŞEYLER YOKTUR ÇÜNKÜ ALPHA SÜRÜMLERİNDEN BİRİDİR DİĞER SÜRÜMÜ BEKLEYİN...)</div>

    <div id="walk-zone"></div>
    <div id="look-area"></div>
    <div id="action-bar">
        <button class="act-btn" id="btn-break">KIR</button>
        <button class="act-btn" id="btn-place">KOY</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, stalker;
        let isGameStarted = false;
        let moveForward = false;
        let velocity = new THREE.Vector3();
        let chunks = {};
        const CHUNK_SIZE = 8;
        const RENDER_DISTANCE = 3; // 3 Chunk sınırı

        let lastTouchX = 0, lastTouchY = 0, lookTouchID = null;

        const mats = {
            grass: new THREE.MeshLambertMaterial({ color: 0x7cfc00 }),
            dirt: new THREE.MeshLambertMaterial({ color: 0x8b4513 }),
            stone: new THREE.MeshLambertMaterial({ color: 0xaaaaaa }),
            trunk: new THREE.MeshLambertMaterial({ color: 0x5d4037 }),
            leaves: new THREE.MeshLambertMaterial({ color: 0x2e7d32 }),
            stalker: new THREE.MeshBasicMaterial({ color: 0xff0000 })
        };

        const blockGeo = new THREE.BoxGeometry(1, 1, 1);

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); 
            scene.fog = new THREE.Fog(0xffffff, 5, 30); // Uzaktaki şeyler sisli

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(50, 100, 50);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            // Başlangıç Chunkları Oluştur
            updateChunks();

            // OYUNCUNUN DÜZGÜN YERDE BAŞLAMASI: 4,4 koordinatındaki zemini bulur
            camera.position.set(4, 40, 4); 
            const startRay = new THREE.Raycaster(new THREE.Vector3(4, 100, 4), new THREE.Vector3(0, -1, 0));
            const startHits = startRay.intersectObjects(scene.children, true);
            if(startHits.length > 0) {
                camera.position.y = startHits[0].point.y + 1.8;
            }

            spawnStalker();
            setupControls();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // Önceki dokunma kontrollerini hiç ellemedik
        function setupControls() {
            const walkZone = document.getElementById('walk-zone');
            const lookArea = document.getElementById('look-area');

            walkZone.addEventListener('touchstart', (e) => { e.preventDefault(); moveForward = true; }, {passive: false});
            walkZone.addEventListener('touchend', () => { moveForward = false; });

            lookArea.addEventListener('touchstart', (e) => {
                const t = e.changedTouches[0];
                lookTouchID = t.identifier;
                lastTouchX = t.pageX; lastTouchY = t.pageY;
            });

            lookArea.addEventListener('touchmove', (e) => {
                if(!isGameStarted) return;
                for(let t of e.changedTouches) {
                    if(t.identifier === lookTouchID) {
                        camera.rotation.y -= (t.pageX - lastTouchX) * 0.006;
                        camera.rotation.x -= (t.pageY - lastTouchY) * 0.006;
                        camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                        lastTouchX = t.pageX; lastTouchY = t.pageY;
                    }
                }
            }, {passive: false});

            document.getElementById('btn-break').addEventListener('touchstart', (e) => { e.preventDefault(); breakBlock(); });
            document.getElementById('btn-place').addEventListener('touchstart', (e) => { e.preventDefault(); placeBlock(); });
        }

        function createTree(parent, x, y, z) {
            let h = 4 + Math.floor(Math.random() * 3);
            for(let i = 1; i <= h; i++) {
                const log = new THREE.Mesh(blockGeo, mats.trunk);
                log.position.set(x, y + i, z);
                parent.add(log);
            }
            for(let ox = -1; ox <= 1; ox++) {
                for(let oz = -1; oz <= 1; oz++) {
                    const leaf = new THREE.Mesh(blockGeo, mats.leaves);
                    leaf.position.set(x + ox, y + h + 1, z + oz);
                    parent.add(leaf);
                }
            }
        }

        function createChunk(cx, cz) {
            const chunkGroup = new THREE.Group();
            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const wX = cx * CHUNK_SIZE + x;
                    const wZ = cz * CHUNK_SIZE + z;
                    let h = Math.floor(Math.sin(wX * 0.2) * 2 + 5);
                    for (let y = 0; y <= h; y++) {
                        const b = new THREE.Mesh(blockGeo, y === h ? mats.grass : (y > h-2 ? mats.dirt : mats.stone));
                        b.position.set(wX, y, wZ);
                        chunkGroup.add(b);
                    }
                    if (h >= 5 && Math.random() < 0.06) createTree(chunkGroup, wX, h, wZ);
                }
            }
            scene.add(chunkGroup);
            chunks[`${cx},${cz}`] = chunkGroup;
        }

        // FPS Optimizasyonu: Sadece 3 chunk çevresini açık tutar
        function updateChunks() {
            const pX = Math.floor(camera.position.x / CHUNK_SIZE);
            const pZ = Math.floor(camera.position.z / CHUNK_SIZE);
            
            for (let key in chunks) {
                const [cx, cz] = key.split(',').map(Number);
                if (Math.abs(cx - pX) > RENDER_DISTANCE || Math.abs(cz - pZ) > RENDER_DISTANCE) {
                    scene.remove(chunks[key]); // Uyku modu: Renderdan çıkar
                } else {
                    scene.add(chunks[key]); // Yakınsa ekle
                }
            }

            for(let x = pX - RENDER_DISTANCE; x <= pX + RENDER_DISTANCE; x++) {
                for(let z = pZ - RENDER_DISTANCE; z <= pZ + RENDER_DISTANCE; z++) {
                    if(!chunks[`${x},${z}`]) createChunk(x, z);
                }
            }
        }

        function breakBlock() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children, true);
            if(hits.length > 0 && hits[0].distance < 8 && hits[0].object !== stalker) {
                hits[0].object.parent.remove(hits[0].object);
            }
        }

        function placeBlock() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children, true);
            if(hits.length > 0 && hits[0].distance < 8) {
                const b = new THREE.Mesh(blockGeo, mats.stone);
                b.position.copy(hits[0].object.position).add(hits[0].face.normal);
                hits[0].object.parent.add(b);
            }
        }

        function spawnStalker() {
            stalker = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2.5, 0.8), mats.stalker);
            stalker.position.set(20, 10, 20);
            scene.add(stalker);
        }

        function startGame() {
            document.getElementById('ui-overlay').style.display = 'none';
            document.getElementById('walk-zone').style.display = 'block';
            document.getElementById('look-area').style.display = 'block';
            document.getElementById('action-bar').style.display = 'flex';
            document.getElementById('crosshair').style.display = 'block';
            isGameStarted = true;
        }

        function update() {
            if(!isGameStarted) return;
            if(moveForward) camera.translateZ(-0.18);
            updateChunks();
            stalker.lookAt(camera.position);
            stalker.position.x += (camera.position.x - stalker.position.x) * 0.008;
            stalker.position.z += (camera.position.z - stalker.position.z) * 0.008;

            const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0,-1,0));
            const hit = ray.intersectObjects(scene.children, true);
            if(hit.length > 0 && hit[0].distance < 1.8) {
                velocity.y = 0;
                camera.position.y = hit[0].point.y + 1.8;
            } else { velocity.y -= 0.01; }
            camera.position.y += velocity.y;
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
