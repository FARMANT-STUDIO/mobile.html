<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farmant Voxel - Ultimate Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87ceeb; font-family: 'Consolas', monospace; touch-action: none; -webkit-user-select: none; user-select: none; }
        canvas { display: block; }

        /* --- GELİŞMİŞ UI PANELLERİ --- */
        #ui-left { position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.8); padding: 8px; z-index: 10; border-radius: 5px; font-size: 10px; border-left: 3px solid #0f0; pointer-events: none; }
        #ui-depth { position: absolute; top: 10px; right: 10px; color: #fff; background: #1a1a1a; padding: 10px; z-index: 10; font-size: 14px; border: 2px solid #555; border-radius: 5px; font-weight: bold; pointer-events: none; }
        
        #health { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; z-index: 10; pointer-events: none; }
        .heart { color: #ff0000; font-size: 18px; text-shadow: 1px 1px #000; }

        #hotbar { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(0,0,0,0.7); padding: 6px; border: 2px solid #444; border-radius: 10px; z-index: 10; }
        .slot { width: 45px; height: 45px; border: 2px solid #888; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; position: relative; font-size: 8px; text-align: center; border-radius: 5px; }
        .slot.selected { border-color: #00ff00; background: rgba(0,255,0,0.2); box-shadow: 0 0 10px #0f0; }
        .count { position: absolute; bottom: 1px; right: 3px; font-size: 10px; color: #ff0; font-weight: bold; }

        /* --- MOBİL KONTROLLER --- */
        #joystick-zone { position: fixed; bottom: 40px; left: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); z-index: 100; }
        #joystick-knob { width: 40px; height: 40px; background: #00ff00; border-radius: 50%; position: absolute; top: 30px; left: 30px; opacity: 0.7; }
        
        .action-btns { position: fixed; bottom: 40px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .act-btn { width: 60px; height: 60px; background: rgba(0,255,0,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #0f0; color: white; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; }
        #crosshair::before, #crosshair::after { content: ""; position: absolute; background: white; }
        #crosshair::before { top: 7px; left: 0; width: 16px; height: 2px; }
        #crosshair::after { left: 7px; top: 0; width: 2px; height: 16px; }
    </style>
</head>
<body>

    <div id="ui-left">
        FPS: <span id="fps">0</span> | <span id="st">AKICI</span><br>
        X: <span id="pos-x">0</span> Z: <span id="pos-z">0</span>
    </div>
    <div id="ui-depth">DERİNLİK: <span id="depth">100</span></div>
    <div id="health"><span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span></div>

    <div id="hotbar">
        <div id="slot-0" class="slot selected" onclick="selectSlot(0)">Toprak<div class="count" id="cnt-0">0</div></div>
        <div id="slot-1" class="slot" onclick="selectSlot(1)">Odun<div class="count" id="cnt-1">0</div></div>
        <div id="slot-2" class="slot" onclick="selectSlot(2)">Maden<div class="count" id="cnt-2">0</div></div>
        <div id="slot-3" class="slot" onclick="selectSlot(3)">Neteryan<div class="count" id="cnt-3">0</div></div>
    </div>

    <div id="crosshair"></div>

    <div id="joystick-zone"><div id="joystick-knob"></div></div>
    <div class="action-btns">
        <div class="act-btn" id="btn-place">🧱</div>
        <div class="act-btn" id="btn-mine">⛏️</div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        const inventory = { toprak: 0, odun: 0, maden: 0, neteryan: 0 };
        const slots = ["toprak", "odun", "maden", "neteryan"];
        let selectedSlot = 0;
        const chunks = {};
        const chunkSize = 8;
        const blocks = [];
        let moveInput = { x: 0, y: 0 };
        let touchLookId = null;
        let lastTouchX, lastTouchY;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        const geo = new THREE.BoxGeometry(1, 1, 1);
        const mats = {
            grass: new THREE.MeshLambertMaterial({ color: 0x2ecc71 }),
            dirt: new THREE.MeshLambertMaterial({ color: 0x8B4513 }),
            stone: new THREE.MeshLambertMaterial({ color: 0x777777 }),
            deepStone: new THREE.MeshLambertMaterial({ color: 0x222222 }),
            wood: new THREE.MeshLambertMaterial({ color: 0x5d4037 }),
            leaf: new THREE.MeshLambertMaterial({ color: 0x1b5e20 }),
            iron: new THREE.MeshLambertMaterial({ color: 0xced4da }),
            neteryan: new THREE.MeshLambertMaterial({ color: 0x2b0040 })
        };

        function addBlock(x, y, z, mat, type) {
            const b = new THREE.Mesh(geo, mat);
            b.position.set(Math.round(x), Math.round(y), Math.round(z));
            b.userData = { type: type };
            scene.add(b);
            blocks.push(b);
        }

        function generateChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunks[key]) return;
            for (let x = 0; x < chunkSize; x++) {
                for (let z = 0; z < chunkSize; z++) {
                    const wx = cx * chunkSize + x;
                    const wz = cz * chunkSize + z;
                    addBlock(wx, 0, wz, mats.grass, "toprak");
                    for (let dy = -1; dy >= -10; dy--) addBlock(wx, dy, wz, mats.dirt, "toprak");
                }
            }
            chunks[key] = true;
        }

        camera.position.set(0, 2, 5);

        // --- MOBİL JOYSTICK ---
        const jZone = document.getElementById('joystick-zone');
        const jKnob = document.getElementById('joystick-knob');
        jZone.addEventListener('touchmove', e => {
            const rect = jZone.getBoundingClientRect();
            const t = e.touches[0];
            let x = t.clientX - rect.left - 50;
            let y = t.clientY - rect.top - 50;
            const dist = Math.min(Math.sqrt(x*x + y*y), 40);
            const angle = Math.atan2(y, x);
            x = Math.cos(angle) * dist;
            y = Math.sin(angle) * dist;
            jKnob.style.transform = `translate(${x}px, ${y}px)`;
            moveInput = { x: x/40, y: y/40 };
        });
        jZone.addEventListener('touchend', () => {
            jKnob.style.transform = `translate(0,0)`;
            moveInput = { x: 0, y: 0 };
        });

        // --- MOBİL BAKIŞ ---
        document.addEventListener('touchstart', e => {
            const t = e.changedTouches[0];
            if(t.clientX > window.innerWidth / 2) {
                touchLookId = t.identifier;
                lastTouchX = t.clientX; lastTouchY = t.clientY;
            }
        });
        document.addEventListener('touchmove', e => {
            for(let t of e.touches) {
                if(t.identifier === touchLookId) {
                    camera.rotation.y -= (t.clientX - lastTouchX) * 0.007;
                    camera.rotation.x -= (t.clientY - lastTouchY) * 0.007;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                    lastTouchX = t.clientX; lastTouchY = t.clientY;
                }
            }
        });

        // --- BUTONLAR ---
        window.selectSlot = (i) => {
            selectedSlot = i;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            document.getElementById('slot-'+i).classList.add('selected');
        };

        document.getElementById('btn-mine').addEventListener('touchstart', () => {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const inter = ray.intersectObjects(blocks);
            if(inter.length > 0 && inter[0].distance < 5) {
                const type = inter[0].object.userData.type;
                if(inventory[type] !== undefined) inventory[type]++;
                scene.remove(inter[0].object);
                blocks.splice(blocks.indexOf(inter[0].object), 1);
                updateUI();
            }
        });

        document.getElementById('btn-place').addEventListener('touchstart', () => {
            const type = slots[selectedSlot];
            if(inventory[type] <= 0) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const inter = ray.intersectObjects(blocks);
            if(inter.length > 0 && inter[0].distance < 5) {
                const p = inter[0].object.position;
                const n = inter[0].face.normal;
                addBlock(p.x+n.x, p.y+n.y, p.z+n.z, mats.dirt, type);
                inventory[type]--;
                updateUI();
            }
        });

        function updateUI() {
            slots.forEach((s, i) => document.getElementById('cnt-'+i).innerText = inventory[s]);
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.translateZ(moveInput.y * 0.15);
            camera.translateX(moveInput.x * 0.15);
            camera.position.y = 2;
            
            const cx = Math.floor(camera.position.x / chunkSize);
            const cz = Math.floor(camera.position.z / chunkSize);
            for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) generateChunk(cx+i, cz+j);

            document.getElementById('pos-x').innerText = Math.round(camera.position.x);
            document.getElementById('pos-z').innerText = Math.round(camera.position.z);
            document.getElementById('depth').innerText = Math.floor(camera.position.y - 2) + 100;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
