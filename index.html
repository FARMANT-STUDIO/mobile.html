<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HORROR MINI - Pro-Mobile Alpha 0.03</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #222 0%, #000 100%); z-index: 100;
        }
        #logo { color: #ff0000; font-size: 32px; font-weight: bold; text-align: center; letter-spacing: 5px; }
        .menu-btn { background: #ff0000; color: white; border: none; padding: 15px 50px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; border-radius: 50px; box-shadow: 0 0 20px rgba(255,0,0,0.5); }
        
        #controls { display: none; }
        .joystick { position: absolute; bottom: 30px; left: 30px; display: grid; grid-template-columns: repeat(3, 65px); gap: 10px; z-index: 50; }
        .actions { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 20px; z-index: 50; }
        .btn { 
            width: 65px; height: 65px; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3); 
            color: white; display: flex; align-items: center; justify-content: center; border-radius: 15px; font-weight: bold;
        }
        .action-btn { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #ff0000; font-size: 18px; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 40;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="logo">HORROR MINI<br><span style="font-size: 14px; color: #fff; letter-spacing: 1px;">OPTIMIZED MOBILE ALPHA 0.03</span></div>
        <button class="menu-btn" onclick="startGame()">DÜNYAYI OLUŞTUR</button>
    </div>

    <div id="controls">
        <div class="joystick">
            <div></div><div class="btn" id="m-up">▲</div><div></div>
            <div class="btn" id="m-left">◀</div><div class="btn" id="m-down">▼</div><div class="btn" id="m-right">▶</div>
        </div>
        <div class="actions">
            <div class="btn action-btn" id="btn-kaz">KAZ</div>
            <div class="btn action-btn" id="btn-koy" style="border-color:#00ff00;">KOY</div>
        </div>
        <div id="crosshair"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, stalker;
        let isGameStarted = false;
        let move = { f: false, b: false, l: false, r: false };
        let touchX = 0, touchY = 0;
        let worldData = {}; // Blok verilerini tutar (Optimization)

        const mats = {
            grass: new THREE.MeshLambertMaterial({ color: 0x567d46 }),
            dirt: new THREE.MeshLambertMaterial({ color: 0x8b4513 }),
            stone: new THREE.MeshLambertMaterial({ color: 0x777777 }),
            trunk: new THREE.MeshLambertMaterial({ color: 0x4d2926 }),
            leaves: new THREE.MeshLambertMaterial({ color: 0x228B22 }),
            stalker: new THREE.MeshBasicMaterial({ color: 0xffffff })
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505); // Karanlık atmosfer
            scene.fog = new THREE.Fog(0x000000, 5, 35);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 15, 0);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(1); // Performans için 1 sabitle
            document.body.appendChild(renderer.domElement);

            const hemi = new THREE.HemisphereLight(0xffffff, 0x000000, 0.8);
            scene.add(hemi);

            stalker = new THREE.Mesh(new THREE.BoxGeometry(0.7, 2, 0.7), mats.stalker);
            stalker.position.set(12, 5, 12);
            scene.add(stalker);

            buildSmartWorld();
            setupMobileEvents();
        }

        // Smart World: Sadece görünür yüzeyleri hesaplar (Minecraft Mantığı)
        function buildSmartWorld() {
            const size = 15;
            const geo = new THREE.BoxGeometry(1, 1, 1);
            
            // 1. Veri haritasını oluştur
            for(let x = -size; x < size; x++) {
                for(let z = -size; z < size; z++) {
                    let h = Math.floor(Math.sin(x*0.2) * 2 + 5);
                    for(let y = 0; y <= h; y++) {
                        worldData[`${x},${y},${z}`] = (y === h) ? 'grass' : 'dirt';
                    }
                    if(Math.random() < 0.04) addTreeData(x, h+1, z);
                }
            }

            // 2. Sadece komşusu olmayan yüzeyleri çiz (Face Culling)
            for (let key in worldData) {
                let [x, y, z] = key.split(',').map(Number);
                if (isExposed(x, y, z)) {
                    const mesh = new THREE.Mesh(geo, mats[worldData[key]]);
                    mesh.position.set(x, y, z);
                    mesh.matrixAutoUpdate = false; 
                    mesh.updateMatrix();
                    scene.add(mesh);
                }
            }
        }

        function isExposed(x, y, z) {
            // Eğer 6 tarafı da doluysa çizme! (Minecraft Optimizasyonu)
            if (worldData[`${x+1},${y},${z}`] && worldData[`${x-1},${y},${z}`] &&
                worldData[`${x},${y+1},${z}`] && worldData[`${x},${y-1},${z}`] &&
                worldData[`${x},${y},${z+1}`] && worldData[`${x},${y},${z-1}`]) return false;
            return true;
        }

        function addTreeData(x, y, z) {
            for(let i=0; i<4; i++) worldData[`${x},${y+i},${z}`] = 'trunk';
            for(let lx=-1; lx<=1; lx++) {
                for(let ly=3; ly<=5; ly++) {
                    for(let lz=-1; lz<=1; lz++) {
                        let key = `${x+lx},${y+ly},${z+lz}`;
                        if(!worldData[key]) worldData[key] = 'leaves';
                    }
                }
            }
        }

        function setupMobileEvents() {
            const b = (id, k) => {
                const e = document.getElementById(id);
                e.ontouchstart = (ev) => { ev.preventDefault(); move[k] = true; };
                e.ontouchend = (ev) => { ev.preventDefault(); move[k] = false; };
            };
            b('m-up','f'); b('m-down','b'); b('m-left','l'); b('m-right','r');

            document.getElementById('btn-kaz').ontouchstart = (e) => { e.preventDefault(); breakBlock(); };
            document.getElementById('btn-koy').ontouchstart = (e) => { e.preventDefault(); placeBlock(); };

            window.ontouchmove = (e) => {
                if(!isGameStarted) return;
                let t = e.touches[0];
                if(t.clientX > window.innerWidth / 2) {
                    if(touchX !== 0) {
                        camera.rotation.y -= (t.clientX - touchX) * 0.006;
                        camera.rotation.x -= (t.clientY - touchY) * 0.006;
                        camera.rotation.x = Math.max(-1.5, 1.5, camera.rotation.x);
                    }
                    touchX = t.clientX; touchY = t.clientY;
                }
            };
            window.ontouchend = () => { touchX = 0; touchY = 0; };
        }

        function breakBlock() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children);
            if(hits.length > 0 && hits[0].distance < 5 && hits[0].object !== stalker) {
                scene.remove(hits[0].object);
            }
        }

        function placeBlock() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children);
            if(hits.length > 0 && hits[0].distance < 5) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mats.stone);
                b.position.copy(hits[0].object.position).add(hits[0].face.normal);
                scene.add(b);
            }
        }

        function startGame() {
            isGameStarted = true;
            document.getElementById('ui-overlay').style.display = 'none';
            document.getElementById('controls').style.display = 'block';
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(isGameStarted) {
                const s = 0.15;
                if(move.f) camera.translateZ(-s);
                if(move.b) camera.translateZ(s);
                if(move.l) camera.translateX(-s);
                if(move.r) camera.translateX(s);
                
                stalker.lookAt(camera.position.x, stalker.position.y, camera.position.z);

                // Gravity & Collision
                const r = new THREE.Raycaster(camera.position, new THREE.Vector3(0,-1,0));
                const h = r.intersectObjects(scene.children);
                if(h.length > 0 && h[0].distance < 1.8) {
                    camera.position.y = h[0].point.y + 1.8;
                } else { camera.position.y -= 0.1; }
            }
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
